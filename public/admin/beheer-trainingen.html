<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beheer Trainingen | Belgium Roleplay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .field-full { grid-column: span 2; }
        .input, .select, .textarea { width: 100%; padding: 0.85rem 1rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); }
        .textarea { min-height: 120px; resize: vertical; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .field-full { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="container">
                <nav class="site-nav">
                    <a class="brand" href="/"><span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span><span class="brand-copy"><strong>Belgium Roleplay</strong><span>Trainingbeheer</span></span></a>
                    <div class="nav-group">
                        <a class="nav-link" href="/trainingen.html">Trainingen</a>
                        <a class="nav-link" href="/admin/dashboard.html">Dashboard</a>
                        <a class="nav-link" href="/admin/gebruikers-beheer.html">Gebruikers</a>
                        <a class="auth-link" href="#" id="logoutLink">Uitloggen</a>
                    </div>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="container">
                <div class="page-head">
                    <h1 class="page-title">Trainingen beheren</h1>
                    <p class="page-copy">Voeg trainingen toe, pas ze aan of verwijder ze.</p>
                </div>

                <section class="section">
                    <form class="form-shell" id="trainingForm">
                        <input id="trainingId" type="hidden">
                        <div class="form-grid">
                            <div class="field field-full"><label>Onderwerp</label><input class="input" id="onderwerp" required></div>
                            <div class="field"><label>Dienst</label><select class="select" id="dienst"><option value="lokale_politie">🚓 Lokale Politie</option><option value="federale_politie">⭐ Federale Politie</option><option value="militaire_politie">⚔️ Militaire Politie</option><option value="ambulance">🚑 Ambulance</option><option value="brandweer">🔥 Brandweer</option></select></div>
                            <div class="field"><label>Status</label><select class="select" id="status"><option value="aangekondigd">📢 Aangekondigd</option><option value="inloop">🚪 Inloop</option><option value="bezig">🔄 Bezig</option><option value="afgerond">✅ Afgerond</option><option value="geannuleerd">❌ Geannuleerd</option><option value="uitgesteld">⏰ Uitgesteld</option></select></div>
                            <div class="field"><label>Datum</label><input class="input" id="datum" placeholder="DD-MM-YYYY" required></div>
                            <div class="field"><label>Tijd</label><input class="input" id="tijd" placeholder="20:00" required></div>
                            <div class="field"><label>Trainer</label><input class="input" id="trainer" required></div>
                            <div class="field"><label>Locatie</label><input class="input" id="locatie"></div>
                            <div class="field"><label>Max deelnemers</label><input class="input" id="maxDeelnemers" type="number" value="10"></div>
                            <div class="field field-full"><label>Notitie</label><textarea class="textarea" id="notitie"></textarea></div>
                        </div>
                        <div class="cta-row"><button class="button button-primary" type="submit">Opslaan</button><button class="button button-ghost" type="button" id="resetBtn">Nieuw formulier</button></div>
                    </form>
                </section>

                <section class="section table-shell">
                    <div class="toolbar"><div class="toolbar-grow"><input class="input" id="searchInput" placeholder="Zoeken..."></div><select class="select" id="statusFilter"><option value="all">Alle statussen</option><option value="aangekondigd">Aangekondigd</option><option value="inloop">Inloop</option><option value="bezig">Bezig</option><option value="afgerond">Afgerond</option><option value="geannuleerd">Geannuleerd</option><option value="uitgesteld">Uitgesteld</option></select></div>
                    <div class="table-scroll"><table class="data-table"><thead><tr><th>ID</th><th>Onderwerp</th><th>Dienst</th><th>Datum</th><th>Trainer</th><th>Status</th><th>Deelnemers</th><th>Acties</th></tr></thead><tbody id="trainingsTable"><tr><td colspan="8">Laden...</td></tr></tbody></table></div>
                </section>
            </div>
        </main>

        <footer class="footer"><div class="container footer__inner"><span>Beheercentrum</span><span>Trainingen beheren</span></div></footer>
    </div>

    <script>
        const API_URL = '/.netlify/functions/api';
        
        // Auth check
        async function checkAuth() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/';
        }
        
        document.getElementById('logoutLink').onclick = logout;
        
        let trainings = [];
        
        function resetForm() {
            document.getElementById('trainingForm').reset();
            document.getElementById('trainingId').value = '';
            document.getElementById('dienst').value = 'lokale_politie';
            document.getElementById('status').value = 'aangekondigd';
            document.getElementById('maxDeelnemers').value = '10';
        }
        
        function populateForm(t) {
            document.getElementById('trainingId').value = t.id;
            document.getElementById('onderwerp').value = t.onderwerp || '';
            document.getElementById('dienst').value = t.dienst || 'lokale_politie';
            document.getElementById('status').value = t.status || 'aangekondigd';
            document.getElementById('datum').value = t.datum || '';
            document.getElementById('tijd').value = t.tijd || '';
            document.getElementById('trainer').value = t.trainer || '';
            document.getElementById('locatie').value = t.locatie || '';
            document.getElementById('maxDeelnemers').value = t.maxDeelnemers || 10;
            document.getElementById('notitie').value = t.notitie || '';
        }
        
        function renderTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const filtered = trainings.filter(t => (statusFilter === 'all' || t.status === statusFilter) && (!query || [t.onderwerp, t.trainer, t.id].join(' ').toLowerCase().includes(query)));
            const tbody = document.getElementById('trainingsTable');
            if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="8">Geen trainingen</td></tr>'; return; }
            tbody.innerHTML = filtered.map(t => `
                <tr>
                    <td><code>${t.id}</code></td>
                    <td><strong>${t.onderwerp || '-'}</strong><div class="table-note">${(t.notitie || '').substring(0, 50)}</div></td>
                    <td>${t.dienst || '-'}</td>
                    <td>${t.datum || '-'} ${t.tijd || ''}</td>
                    <td>${t.trainer || '-'}</td>
                    <td><span class="pill pill-status-${t.status}">${t.status_text || t.status}</span></td>
                    <td>${t.aangemeld?.length || 0}/${t.maxDeelnemers || '-'}</td>
                    <td><button class="button-small button-secondary" onclick='editTraining("${t.id}")'><i class="fa-solid fa-pen"></i></button> <button class="button-small button-danger" onclick='deleteTraining("${t.id}")'><i class="fa-solid fa-trash"></i></button></td>
                </tr>
            `).join('');
        }
        
        async function loadTrainings() {
            const response = await fetch(API_URL);
            const data = await response.json();
            trainings = Array.isArray(data) ? data : [];
            renderTable();
        }
        
        async function saveTraining(e) {
            e.preventDefault();
            const payload = {
                id: document.getElementById('trainingId').value || undefined,
                onderwerp: document.getElementById('onderwerp').value,
                dienst: document.getElementById('dienst').value,
                status: document.getElementById('status').value,
                status_text: document.getElementById('status').options[document.getElementById('status').selectedIndex]?.text || '',
                datum: document.getElementById('datum').value,
                tijd: document.getElementById('tijd').value,
                trainer: document.getElementById('trainer').value,
                locatie: document.getElementById('locatie').value,
                maxDeelnemers: parseInt(document.getElementById('maxDeelnemers').value),
                notitie: document.getElementById('notitie').value,
                toegevoegd_door: 'admin'
            };
            const method = payload.id ? 'PUT' : 'POST';
            await fetch('/api/training', { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            resetForm();
            loadTrainings();
            alert(payload.id ? 'Training aangepast' : 'Training toegevoegd');
        }
        
        window.editTraining = (id) => {
            const t = trainings.find(t => t.id === id);
            if (t) populateForm(t);
        };
        
        window.deleteTraining = async (id) => {
            if (!confirm('Verwijder deze training?')) return;
            await fetch(`/api/training?id=${id}`, { method: 'DELETE' });
            loadTrainings();
            alert('Training verwijderd');
        };
        
        document.getElementById('trainingForm').addEventListener('submit', saveTraining);
        document.getElementById('resetBtn').onclick = resetForm;
        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('statusFilter').addEventListener('change', renderTable);
        
        if (checkAuth()) {
            loadTrainings();
        }
    </script>
</body>
</html>
