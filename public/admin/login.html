<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Belgium Roleplay</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a237e 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        
        .login-btn {
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(26, 35, 126, 0.5);
        }
        
        .status {
            margin-top: 1.5rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            display: none;
        }
        
        .status.success {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: block;
        }
        
        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }
        
        .status.info {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            display: block;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            font-size: 0.8rem;
        }
        
        .feature i {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Belgium Roleplay</h1>
        <div class="subtitle">Admin Login</div>
        
        <button id="loginButton" class="login-btn">
            <i class="fab fa-netlify"></i> Inloggen met Netlify
        </button>
        
        <div id="status" class="status"></div>
        
        <div class="features">
            <div class="feature"><i class="fas fa-check-circle"></i><span>Trainingen beheren</span></div>
            <div class="feature"><i class="fas fa-check-circle"></i><span>Status wijzigen</span></div>
            <div class="feature"><i class="fas fa-check-circle"></i><span>Real-time sync</span></div>
        </div>
    </div>
    
    <script>
        (function() {
            const loginBtn = document.getElementById('loginButton');
            const statusDiv = document.getElementById('status');
            
            function showStatus(message, type) {
                statusDiv.textContent = message;
                statusDiv.className = `status ${type}`;
                setTimeout(() => {
                    if (statusDiv.className === `status ${type}`) {
                        statusDiv.style.display = 'none';
                        statusDiv.className = 'status';
                    }
                }, 3000);
            }
            
            if (!window.netlifyIdentity) {
                showStatus('Netlify Identity niet geladen. Vernieuw de pagina.', 'error');
                return;
            }
            
            // Check of al ingelogd
            const currentUser = window.netlifyIdentity.currentUser();
            if (currentUser) {
                showStatus('Je bent al ingelogd! Doorverwijzen...', 'success');
                setTimeout(() => {
                    window.location.href = '/admin/dashboard.html';
                }, 1000);
                return;
            }
            
            loginBtn.onclick = () => {
                showStatus('Login venster openen...', 'info');
                window.netlifyIdentity.open();
            };
            
            window.netlifyIdentity.on('login', () => {
                showStatus('Login succesvol! Doorverwijzen...', 'success');
                setTimeout(() => {
                    window.location.href = '/admin/dashboard.html';
                }, 1000);
            });
            
            window.netlifyIdentity.on('error', (err) => {
                console.error('Login error:', err);
                showStatus('Login mislukt. Probeer opnieuw.', 'error');
            });
        })();
    </script>
</body>
</html>
