<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Belgium Roleplay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .login-card {
            background: rgba(30,41,59,0.7);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }
        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(15,23,42,0.8);
            color: white;
        }
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #1a237e, #283593);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .error {
            color: #f87171;
            margin-top: 1rem;
            text-align: center;
        }
        .success {
            color: #34d399;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="container">
                <nav class="site-nav">
                    <a class="brand" href="/">
                        <span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span>
                        <span class="brand-copy">
                            <strong>Belgium Roleplay</strong>
                            <span>Admin Center</span>
                        </span>
                    </a>
                    <div class="nav-group">
                        <a class="nav-link" href="/trainingen.html">Trainingen</a>
                        <a class="nav-link" href="/admin/dashboard.html">Admin</a>
                    </div>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="container login-container">
                <div class="login-card">
                    <h1 style="text-align: center; margin-bottom: 1.5rem;">Admin Login</h1>
                    <div class="input-group">
                        <label>Gebruikersnaam</label>
                        <input type="text" id="gebruikersnaam" placeholder="gebruikersnaam">
                    </div>
                    <div class="input-group">
                        <label>Wachtwoord</label>
                        <input type="password" id="wachtwoord" placeholder="wachtwoord">
                    </div>
                    <button class="login-btn" id="loginBtn">Inloggen</button>
                    <div id="message"></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container footer__inner">
                <span>Admin login</span>
                <span>Belgium Roleplay Training Systeem</span>
            </div>
        </footer>
    </div>

    <script>
        const API_URL = '/.netlify/functions/api-gebruikers';
        
        async function login() {
            const gebruikersnaam = document.getElementById('gebruikersnaam').value;
            const wachtwoord = document.getElementById('wachtwoord').value;
            const messageDiv = document.getElementById('message');
            
            if (!gebruikersnaam || !wachtwoord) {
                messageDiv.innerHTML = '<div class="error">Vul gebruikersnaam en wachtwoord in</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gebruikersnaam, wachtwoord })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminNaam', data.naam);
                    messageDiv.innerHTML = '<div class="success">Login succesvol! Doorverwijzen...</div>';
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1000);
                } else {
                    messageDiv.innerHTML = '<div class="error">Ongeldige gebruikersnaam of wachtwoord</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="error">Fout bij inloggen</div>';
            }
        }
        
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('wachtwoord').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        // Check of al ingelogd
        const token = localStorage.getItem('adminToken');
        if (token) {
            window.location.href = '/admin/dashboard.html';
        }
    </script>
</body>
</html>
