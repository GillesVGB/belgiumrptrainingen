<!DOCTYPE html>
<html lang="nl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainingen - Breda Roleplay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e;
            --primary-dark: #283593;
            --secondary: #10b981;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--light);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        
        /* Header */
        header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 0;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo i {
            font-size: 2rem;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--gray);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--light);
            background: rgba(99, 102, 241, 0.1);
        }
        
        /* Main Content */
        .main-content {
            padding: 2rem 0;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Training Cards */
        .trainings-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .training-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .training-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        
        .training-header {
            padding: 1rem;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .training-title {
            font-weight: 600;
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-not_started { background: rgba(59,130,246,0.3); color: #60a5fa; }
        .status-in_progress { background: rgba(245,158,11,0.3); color: #fbbf24; }
        .status-completed { background: rgba(16,185,129,0.3); color: #34d399; }
        .status-cancelled { background: rgba(239,68,68,0.3); color: #f87171; }
        
        .training-content {
            padding: 1.5rem;
        }
        
        .training-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin: 1rem 0;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .detail-item i {
            color: var(--primary);
            width: 1.25rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn-roblox {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            color: white;
            width: 100%;
            margin-top: 1rem;
        }
        
        .btn-roblox:hover {
            background: linear-gradient(135deg, #cc0000 0%, #990000 100%);
        }
        
        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(30,41,59,0.7);
            border-radius: 1rem;
            border: 2px dashed rgba(255,255,255,0.1);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--gray);
            margin-bottom: 1rem;
        }
        
        /* Loading */
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99,102,241,0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Footer */
        footer {
            background: rgba(15,23,42,0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 2rem 0;
            margin-top: 3rem;
            text-align: center;
            color: var(--gray);
        }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .trainings-container { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>Breda Roleplay</span>
                </div>
                <ul class="nav-links">
                    <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="/trainingen.html" class="active"><i class="fas fa-graduation-cap"></i> Trainingen</a></li>
                    <li><a href="/admin/dashboard.html"><i class="fas fa-user-shield"></i> Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1><i class="fas fa-graduation-cap"></i> Trainingen Overzicht</h1>
                <p>Bekijk alle geplande trainingen</p>
            </div>
            
            <div id="trainings-container" class="trainings-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Trainingen laden...</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Breda The Netherlands Roleplay</p>
        </div>
    </footer>

    <script>
        // ===========================================
        // DIT IS DE BELANGRIJKE API_URL - HIERONDER
        // ===========================================
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api'
            : 'https://belgium-roleplay.netlify.app/.netlify/functions/api';
        
        console.log('🌐 API URL:', API_URL);

        let allTrainings = [];

        // ===========================================
        // TRAININGEN LADEN
        // ===========================================
        async function loadTrainings() {
            try {
                console.log('📡 Laden van:', API_URL);
                
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP fout! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('✅ Geladen trainingen:', data);
                
                allTrainings = Array.isArray(data) ? data : [];
                displayTrainings(allTrainings);
                
            } catch (error) {
                console.error('❌ Fout bij laden:', error);
                
                document.getElementById('trainings-container').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Fout bij laden</h3>
                        <p>${error.message}</p>
                        <p><small>API URL: ${API_URL}</small></p>
                        <button onclick="location.reload()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; cursor: pointer;">
                            <i class="fas fa-sync-alt"></i> Probeer opnieuw
                        </button>
                    </div>
                `;
            }
        }

        // ===========================================
        // TRAININGEN TONEN
        // ===========================================
        function displayTrainings(trainings) {
            const container = document.getElementById('trainings-container');
            
            if (!trainings || trainings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-times"></i>
                        <h3>Geen trainingen gevonden</h3>
                        <p>Er zijn nog geen trainingen gepland.</p>
                        <p><small>Gebruik /training in Discord om er een toe te voegen!</small></p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            trainings.forEach(training => {
                const statusIcons = {
                    'not_started': '🟦',
                    'in_progress': '🟨',
                    'completed': '🟩',
                    'cancelled': '🟥',
                    'delayed': '🟪'
                };
                
                const dienstIcons = {
                    'politie': '🚔',
                    'ambulance': '🚑',
                    'brandweer': '🚒',
                    'handhaving': '🔧',
                    'algemeen': '👮'
                };
                
                html += `
                    <div class="training-card">
                        <div class="training-header">
                            <span class="training-title">${training.onderwerp || 'Training'}</span>
                            <span class="status-badge status-${training.status || 'not_started'}">
                                ${statusIcons[training.status] || '📌'} ${training.status_text || 'Onbekend'}
                            </span>
                        </div>
                        <div class="training-content">
                            <div class="training-details">
                                <div class="detail-item">
                                    <i class="fas fa-calendar"></i>
                                    <span>${training.datum || 'Onbekend'} ${training.tijd ? 'om ' + training.tijd : ''}</span>
                                </div>
                                <div class="detail-item">
                                    <i class="fas fa-user"></i>
                                    <span>${training.trainer || 'Onbekend'}</span>
                                </div>
                                <div class="detail-item">
                                    ${dienstIcons[training.dienst] || '📌'}
                                    <span>${training.dienst || 'Onbekend'}</span>
                                </div>
                                <div class="detail-item">
                                    <i class="fas fa-users"></i>
                                    <span>${training.aangemeld?.length || 0}/${training.maxDeelnemers || '?'}</span>
                                </div>
                            </div>
                            ${training.van_discord ? `
                                <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; color: var(--gray);">
                                    <i class="fab fa-discord" style="color: #5865F2;"></i>
                                    <small>Toegevoegd via Discord door ${training.toegevoegd_door || 'Onbekend'}</small>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // ===========================================
        // INITIALISEER
        // ===========================================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 Pagina geladen');
            loadTrainings();
            
            // Auto-refresh elke 30 seconden
            setInterval(loadTrainings, 30000);
        });
    </script>
</body>
</html>
